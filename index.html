<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebGPU Hand Tracking</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #eee;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 12px;
      font-weight: 400;
    }
    #status {
      margin-bottom: 12px;
      color: #aaa;
      font-size: 0.9rem;
    }
    #container {
      position: relative;
      display: inline-block;
    }
    #webcam {
      display: block;
      border-radius: 8px;
    }
    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      border-radius: 8px;
      pointer-events: none;
    }
    #fps {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(0,0,0,0.6);
      color: #0f0;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <h1>WebGPU Hand Tracking</h1>
  <div id="status">Initializing...</div>
  <div id="container">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="overlay"></canvas>
    <div id="fps"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
