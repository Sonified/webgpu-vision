<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Face Detector Test</title></head>
<body style="background:#111;color:#0f0;font:13px monospace;padding:16px;white-space:pre-wrap;">
<div id="log">Face Detector Model Test
========================
</div>
<script type="module">
import { ModelRunner } from './model-runner.js';

const L = document.getElementById('log');
const log = s => { L.textContent += s + '\n'; console.log(s); };

(async () => {
try {
  log(`Started: ${new Date().toISOString()}`);
  await import('./session-timer.mjs').then(m => m.logBanner(log)).catch(() => {});
  if (!navigator.gpu) { log('No WebGPU'); return; }
  const adapter = await navigator.gpu.requestAdapter();
  const device = await adapter.requestDevice();
  log('WebGPU ready');

  const graph = await (await fetch('../models/face_detector.json')).json();
  const allWeights = new Float32Array(await (await fetch('../models/face_detector.bin')).arrayBuffer());
  log(`Model: ${graph.graph.length} nodes, ${(allWeights.length*4/1024/1024).toFixed(2)} MB`);

  const W = {};
  for (const [name, info] of Object.entries(graph.weights)) {
    if (info.length === 0) continue;
    const buf = device.createBuffer({ size: Math.max(info.length * 4, 4), usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
    device.queue.writeBuffer(buf, 0, allWeights.subarray(info.offset, info.offset + info.length));
    W[name] = buf;
  }

  const mkP = async (name) => {
    const code = await (await fetch(`./${name}.wgsl`)).text();
    return device.createComputePipeline({ layout: 'auto', compute: { module: device.createShaderModule({ code }), entryPoint: 'main' } });
  };
  const P = {
    conv2d: await mkP('conv2d'), maxpool: await mkP('maxpool'), resize: await mkP('resize'),
    gemm: await mkP('gemm'), global_avg_pool: await mkP('global_avg_pool'),
    add: await mkP('add'), pad_channels: await mkP('pad_channels'),
    fused_block: await mkP('fused_block'),
    transpose_nhwc: await mkP('transpose_nhwc'),
  };
  log('Shaders compiled');

  // Consolidated weight buffer for fused shader (indexes by offset)
  const allWeightsBuf = device.createBuffer({ size: allWeights.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
  device.queue.writeBuffer(allWeightsBuf, 0, allWeights);

  // Input: NCHW [1, 3, 128, 128], 0.5 gray
  const inputNCHW = new Float32Array(3 * 128 * 128).fill(0.5);
  const inputBuf = device.createBuffer({
    size: inputNCHW.byteLength,
    usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC | GPUBufferUsage.COPY_DST,
  });
  device.queue.writeBuffer(inputBuf, 0, inputNCHW);

  const runner = new ModelRunner(device, P, W, allWeightsBuf);

  log('\nRunning inference...');
  const t0 = performance.now();
  const outputs = await runner.run(graph, inputBuf, allWeights, true);
  log(`Inference time: ${(performance.now() - t0).toFixed(1)}ms`);

  const ref = await (await fetch('./face_det_reference.json')).json();
  log('\n--- Results ---');
  for (const [name, data] of Object.entries(outputs)) {
    const vals = Array.from(data.slice(0, 6)).map(v => v.toFixed(4)).join(', ');
    log(`${name}: [${vals}${data.length > 6 ? ', ...' : ''}] (${data.length} floats)`);
    if (ref[name]) {
      let maxErr = 0;
      for (let j = 0; j < Math.min(data.length, ref[name].length); j++)
        maxErr = Math.max(maxErr, Math.abs(data[j] - ref[name][j]));
      log(`  ref: [${ref[name].slice(0,6).map(v=>v.toFixed(4)).join(', ')}]`);
      log(`  max error: ${maxErr.toFixed(6)} ${maxErr < 1.0 ? '✅' : '❌'}`);
    }
  }

  log('\n--- Benchmark: interpreted (50 iterations) ---');
  for (let i = 0; i < 5; i++) await runner.run(graph, inputBuf, allWeights);
  const N = 50;
  const bt0 = performance.now();
  for (let i = 0; i < N; i++) await runner.run(graph, inputBuf, allWeights);
  log(`WGSL interpreted: ${((performance.now() - bt0) / N).toFixed(2)} ms/inference`);

  log('\n--- Benchmark: compiled (50 iterations) ---');
  await runner.compile(graph, inputBuf, allWeights);
  for (let i = 0; i < 5; i++) await runner.runCompiled();
  const ct0 = performance.now();
  for (let i = 0; i < N; i++) await runner.runCompiled();
  log(`WGSL compiled:    ${((performance.now() - ct0) / N).toFixed(2)} ms/inference`);

  try {
    const ort = await import('../vendor/onnxruntime-web/ort.webgpu.min.mjs');
    ort.env.wasm.numThreads = 1; ort.env.wasm.proxy = false;
    const sess = await ort.InferenceSession.create('../models/face_detector.onnx', { executionProviders: ['wasm'] });
    const tensor = new ort.Tensor('float32', new Float32Array(128*128*3).fill(0.5), [1, 128, 128, 3]);
    for (let i = 0; i < 5; i++) await sess.run({ input: tensor });
    const ot0 = performance.now();
    for (let i = 0; i < N; i++) await sess.run({ input: tensor });
    log(`ORT WASM: ${((performance.now() - ot0) / N).toFixed(2)} ms/inference`);
  } catch (e) { log(`ORT: ${e.message}`); }

  log('\n========================');
  log('done');
} catch (e) { log('ERROR: ' + e.message); log(e.stack || ''); }
})();
</script>
</body>
</html>
